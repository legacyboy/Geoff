<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoff AI</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --primary: #4a90e2;
            --text: #333;
            --border: #ddd;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 300px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.5;
        }
        .user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 2px;
        }
        .assistant {
            align-self: flex-start;
            background: #e9e9eb;
            color: var(--text);
            border-bottom-left-radius: 2px;
        }
        #input-area {
            padding: 20px;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:disabled { background: #ccc; }
        
        .config-group {
            margin-bottom: 20px;
        }
        .config-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #666;
        }
        .config-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        #upload-box {
            margin-top: auto;
            padding: 15px;
            border: 2px dashed var(--border);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        #upload-box:hover { border-color: var(--primary); }
        #file-input { display: none; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>⚙️ Configuration</h2>
        <div class="config-group">
            <label>Ollama Base URL</label>
            <input type="text" id="conf-url" placeholder="http://localhost:11434">
        </div>
        <div class="config-group">
            <label>Model</label>
            <input type="text" id="conf-model" placeholder="qwen2.5-coder:14b">
        </div>
        <div class="config-group">
            <label>Evidence Location</label>
            <input type="text" id="conf-evidence" placeholder="/path/to/evidence">
        </div>
        <button onclick="saveConfig()">Save Config</button>

        <div id="upload-box" onclick="document.getElementById('file-input').click()">
            <span>📁 Upload Evidence</span>
            <input type="file" id="file-input" onchange="uploadFile(this)">
        </div>
    </div>

    <div id="main">
        <div id="chat-container"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Message Geoff..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let history = [];

        async function loadConfig() {
            const res = await fetch('/api/config');
            const config = await res.json();
            document.getElementById('conf-url').value = config.ollamaBaseUrl;
            document.getElementById('conf-model').value = config.model;
            document.getElementById('conf-evidence').value = config.evidenceLocation;
        }

        async function saveConfig() {
            const body = {
                ollamaBaseUrl: document.getElementById('conf-url').value,
                model: document.getElementById('conf-model').value,
                evidenceLocation: document.getElementById('conf-evidence').value,
            };
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            alert('Configuration saved!');
        }

        async function uploadFile(input) {
            if (!input.files || !input.files[0]) return;
            const formData = new FormData();
            formData.append('file', input.files[0]);

            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                addMessage('assistant', `Uploaded: ${data.filename}`);
            }
        }

        function addMessage(role, content) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerText = content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            btn.disabled = true;
            addMessage('user', text);

            const assistantDiv = addMessage('assistant', '...');
            let fullResponse = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                assistantDiv.innerText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    fullResponse += chunk;
                    assistantDiv.innerText = fullResponse;
                }

                history.push({ role: 'user', content: text });
                history.push({ role: 'assistant', content: fullResponse });

            } catch (e) {
                assistantDiv.innerText = 'Error: ' + e.message;
            } finally {
                btn.disabled = false;
            }
        }

        loadConfig();
    </script>
</body>
</html>
