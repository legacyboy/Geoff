<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEOFF - MITRE ATT&CK Heatmap</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --bg-deep: #0a0c10;
    --bg-primary: #0f1117;
    --bg-card: #151820;
    --bg-elevated: #1a1e28;
    --bg-hover: #222736;
    --border: #252a36;
    --border-light: #2e3444;
    --text-primary: #e8ecf4;
    --text-secondary: #8b92a5;
    --text-muted: #565d73;
    --accent-red: #e5303e;
    --accent-red-glow: rgba(229, 48, 62, 0.25);
    --accent-red-dim: rgba(229, 48, 62, 0.08);
    --accent-amber: #f0a030;
    --accent-geoff: #e5303e;
    --cell-detected: #e5303e;
    --cell-detected-hover: #f04050;
    --cell-not-detected: rgba(255,255,255,0.03);
    --cell-not-detected-border: rgba(255,255,255,0.06);
    --scrollbar-bg: #151820;
    --scrollbar-thumb: #2e3444;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-bg); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius:3px; }

/* Ambient background */
.ambient-bg {
    position: fixed; top:0; left:0; width:100%; height:100%;
    pointer-events: none; z-index:0;
    background:
        radial-gradient(ellipse 800px 400px at 20% 10%, rgba(229,48,62,0.04), transparent),
        radial-gradient(ellipse 600px 600px at 80% 80%, rgba(229,48,62,0.02), transparent);
}

/* Header */
.app-header {
    position: sticky; top:0; z-index:100;
    background: rgba(10,12,16,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
}
.brand {
    display: flex; align-items: center; gap: 12px;
}
.brand-mark {
    width: 36px; height: 36px;
    background: var(--accent-red);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 14px; color: #fff;
    box-shadow: 0 0 20px var(--accent-red-glow);
}
.brand-text {
    font-weight: 700; font-size: 20px; letter-spacing: 3px; color: var(--text-primary);
}
.brand-sub {
    font-size: 11px; color: var(--text-muted); letter-spacing: 1px; margin-top:1px;
}
.header-meta {
    display: flex; align-items: center; gap: 24px;
}
.case-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text-secondary);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 6px;
}
.status-indicator {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-secondary);
}
.status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #2ecc71;
    box-shadow: 0 0 8px rgba(46,204,113,0.4);
    animation: pulse-dot 2s ease-in-out infinite;
}
.status-dot.loading { background: var(--accent-amber); box-shadow: 0 0 8px rgba(240,160,48,0.4); }
.status-dot.error { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red-glow); }

@keyframes pulse-dot {
    0%,100% { opacity:1; } 50% { opacity:0.5; }
}

/* Stats bar */
.stats-bar {
    display: flex; align-items: center; gap: 20px;
    padding: 12px 28px;
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 62px; z-index: 99;
    flex-wrap: wrap;
}
.stat-chip {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-secondary);
    padding: 5px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
}
.stat-chip .val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; color: var(--text-primary);
}
.stat-chip.detected .val { color: var(--accent-red); }
.stat-chip .icon { font-size: 12px; color: var(--text-muted); }

.filter-group {
    display: flex; gap: 6px; margin-left: auto;
}
.filter-btn {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px; color: var(--text-secondary);
    padding: 5px 14px; border-radius: 5px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.filter-btn.active { background: var(--accent-red); color: #fff; border-color: var(--accent-red); }

/* Main content */
.main-content {
    padding: 24px 28px 60px;
    position: relative; z-index:1;
}

/* Matrix grid */
.matrix-container {
    overflow-x: auto;
    padding-bottom: 20px;
}
.matrix-table {
    display: grid;
    gap: 3px;
    min-width: max-content;
}

/* Tactic header */
.tactic-header {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 8px;
    text-align: center;
    position: sticky; top: 0; z-index: 10;
}
.tactic-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.5px;
    line-height: 1.3;
}
.tactic-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
}
.tactic-count .det-count { color: var(--accent-red); font-weight: 700; }

/* Technique cell */
.tech-cell {
    width: 100%;
    min-height: 48px;
    border-radius: 4px;
    padding: 6px 7px;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.tech-cell.not-detected {
    background: var(--cell-not-detected);
    border: 1px solid var(--cell-not-detected-border);
}
.tech-cell.not-detected:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.12);
}
.tech-cell.detected {
    background: rgba(229,48,62,0.15);
    border: 1px solid rgba(229,48,62,0.35);
    box-shadow: 0 0 12px rgba(229,48,62,0.08);
}
.tech-cell.detected:hover {
    background: rgba(229,48,62,0.25);
    border-color: rgba(229,48,62,0.55);
    box-shadow: 0 0 20px rgba(229,48,62,0.15);
}
.tech-cell.detected::before {
    content: '';
    position: absolute; top: 3px; right: 3px;
    width: 6px; height: 6px;
    background: var(--accent-red);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--accent-red-glow);
}
.tech-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    line-height: 1.2;
}
.not-detected .tech-id { color: var(--text-muted); }
.detected .tech-id { color: var(--accent-red); }
.tech-name {
    font-size: 10px;
    line-height: 1.3;
    margin-top: 2px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
}
.not-detected .tech-name { color: var(--text-muted); opacity:0.6; }
.detected .tech-name { color: var(--text-primary); }
.tech-evidence-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: rgba(229,48,62,0.7);
    margin-top: 2px;
}

/* Detail panel */
.detail-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    z-index: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
}
.detail-overlay.visible { opacity:1; pointer-events:all; }

.detail-panel {
    position: fixed; top:0; right:0; width: 480px; max-width:90vw;
    height: 100vh;
    background: var(--bg-primary);
    border-left: 1px solid var(--border);
    z-index: 501;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
    overflow-y: auto;
    box-shadow: -10px 0 40px rgba(0,0,0,0.5);
}
.detail-panel.visible { transform: translateX(0); }

.detail-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    position: sticky; top:0;
    background: var(--bg-primary);
    z-index: 2;
}
.detail-close {
    position: absolute; top:16px; right:16px;
    width: 32px; height: 32px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
}
.detail-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.detail-tactic {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 6px;
}
.detail-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700;
    color: var(--accent-red);
    margin-bottom: 4px;
}
.detail-name {
    font-size: 16px; font-weight: 500;
    color: var(--text-primary);
    line-height: 1.4;
}
.detail-status {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 12px; padding: 4px 12px;
    border-radius: 4px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px;
}
.detail-status.detected-status {
    background: rgba(229,48,62,0.15);
    color: var(--accent-red);
    border: 1px solid rgba(229,48,62,0.3);
}
.detail-status.not-detected-status {
    background: rgba(255,255,255,0.04);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.08);
}

.detail-body { padding: 24px; }
.detail-section { margin-bottom: 28px; }
.detail-section-title {
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
}
.detail-section-title i { font-size: 12px; }

.evidence-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
}
.evidence-card:hover { border-color: var(--border-light); }
.evidence-type {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
}
.evidence-type.file { color: #5dade2; }
.evidence-type.ioc { color: var(--accent-amber); }
.evidence-type.finding { color: #a569bd; }
.evidence-type.network { color: #58d68d; }
.evidence-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text-primary);
    line-height: 1.5;
    word-break: break-all;
}
.no-evidence {
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
    padding: 20px 0;
}

/* Tooltip */
.hover-tooltip {
    position: fixed;
    z-index: 400;
    background: var(--bg-elevated);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 12px 16px;
    max-width: 340px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.hover-tooltip.visible { opacity:1; }
.hover-tooltip .tt-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 700;
    color: var(--accent-red);
    margin-bottom: 3px;
}
.hover-tooltip .tt-name {
    font-size: 12px; color: var(--text-primary);
    margin-bottom: 6px; line-height: 1.3;
}
.hover-tooltip .tt-hint {
    font-size: 10px; color: var(--text-muted);
}
.hover-tooltip .tt-findings {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
}
.hover-tooltip .tt-finding-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-secondary);
    padding: 2px 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 280px;
}

/* Loading state */
.loading-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 120px 20px;
}
.loader-ring {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text {
    margin-top: 16px; font-size: 13px; color: var(--text-muted);
}

/* Error state */
.error-state {
    text-align: center; padding: 80px 20px;
}
.error-state i { font-size: 40px; color: var(--accent-red); margin-bottom: 16px; }
.error-state h3 { font-size: 18px; color: var(--text-primary); margin-bottom: 8px; }
.error-state p { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
.retry-btn {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--accent-red); color: #fff;
    border: none; padding: 10px 24px; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
}
.retry-btn:hover { background: var(--cell-detected-hover); }

/* Empty state for no detections */
.empty-detect {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-size: 14px;
}

/* Responsive */
@media (max-width: 768px) {
    .app-header { padding: 12px 16px; }
    .stats-bar { padding: 10px 16px; }
    .main-content { padding: 16px; }
    .filter-group { margin-left: 0; margin-top: 8px; width: 100%; }
    .detail-panel { width: 100vw; max-width: 100vw; }
}

/* Scan line animation on detected cells */
@keyframes scanline {
    0% { background-position: 0 0; }
    100% { background-position: 0 100%; }
}
.tech-cell.detected {
    background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(229,48,62,0.03) 2px,
        rgba(229,48,62,0.03) 4px
    );
    background-size: 100% 200%;
    animation: scanline 8s linear infinite;
}

@media (prefers-reduced-motion: reduce) {
    .tech-cell.detected { animation: none; }
    .status-dot { animation: none; }
}
</style>
</head>

<div class="ambient-bg"></div>

<!-- Header -->
<header class="app-header">
    <div class="brand">
        <div class="brand-mark">G</div>
        <div>
            <div class="brand-text">GEOFF</div>

            <span id="statusText">Initializing...</span>
        </div>
    </div>
</header>

<!-- Stats bar -->
<div class="stats-bar" id="statsBar">
    <div class="stat-chip detected">
        <i class="fa-solid fa-crosshairs icon"></i>
        <span>Detected:</span>

        <span class="val" id="statCoverage">0%</span>
    </div>
    <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="detected">Detected Only</button>
        <button class="filter-btn" data-filter="undetected">Not Detected</button>
    </div>
</div>

<!-- Main -->
<main class="main-content">
    <div id="loadingState" class="loading-state">
        <div class="loader-ring"></div>
        <div class="loader-text">Loading case data and mapping techniques...</div>
    </div>
    <div id="errorState" class="error-state" style="display:none;"></div>
    <div id="matrixContainer" class="matrix-container" style="display:none;"></div>
</main>

<!-- Tooltip -->
<div class="hover-tooltip" id="hoverTooltip">
    <div class="tt-id" id="ttId"></div>
    <div class="tt-name" id="ttName"></div>
    <div class="tt-hint" id="ttHint"></div>
    <div class="tt-findings" id="ttFindings" style="display:none;"></div>
</div>

<!-- Detail overlay + panel -->
<div class="detail-overlay" id="detailOverlay"></div>
<div class="detail-panel" id="detailPanel">
    <div class="detail-header">
        <button class="detail-close" id="detailClose" aria-label="Close detail panel"><i class="fa-solid fa-xmark"></i></button>
        <div class="detail-tactic" id="detailTactic"></div>
        <div class="detail-id" id="detailId"></div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-status" id="detailStatus"></div>
    </div>
    <div class="detail-body" id="detailBody"></div>
</div>

let caseData = null;
let detectedTechniques = {}; // { "TXXXX": [ { type, text } ] }
let currentFilter = "all";

// ============================================
// Extract case ID from URL
// ============================================
function getCaseId() {
    const path = window.location.pathname;
    const match = path.match(/\/cases\/([^/]+)/);
    if (match) return match[1];
    const params = new URLSearchParams(window.location.search);
    return params.get('caseId') || params.get('case') || 'default';
}

// ============================================
// Fetch case report JSON
// ============================================
async function fetchCaseData(caseId) {
    const endpoints = [
        `/reports/${caseId}/json`,
        `/api/reports/${caseId}`,
        `/api/cases/${caseId}/report`,
        `/cases/${caseId}/report/json`
    ];

    for (const url of endpoints) {
        try {
            const resp = await fetch(url);
            if (resp.ok) {
                const data = await resp.json();
                return data;
            }
        } catch(e) { /* try next */ }
    }
    return null;
}

// ============================================
// Parse MITRE techniques from case JSON
// ============================================
function extractTechniquesFromReport(data) {
    const findings = {};

    // Helper: add a finding to a technique
    function addFinding(techId, type, text) {
        techId = techId.trim().toUpperCase();
        // Normalize: T1059.001 -> T1059.001, t1059 -> T1059
        if (!techId.match(/^T\d{4}(\.\d{3})?$/)) return;
        if (!findings[techId]) findings[techId] = [];
        // Deduplicate
        const key = type + '::' + text;
        if (!findings[techId].some(f => (f.type+'::'+f.text) === key)) {
            findings[techId].push({ type, text });
        }
    }

    if (!data) return findings;

    // Strategy 1: Direct mitre_techniques_observed field
    if (data.mitre_techniques_observed) {
        const observed = data.mitre_techniques_observed;
        if (Array.isArray(observed)) {
            observed.forEach(entry => {
                if (typeof entry === 'string') {
                    addFinding(entry, 'finding', 'Identified in case findings');
                } else if (entry.technique_id || entry.id) {
                    const tid = entry.technique_id || entry.id;
                    const evList = entry.evidence || entry.findings || entry.linked_findings || [];
                    if (evList.length > 0) {
                        evList.forEach(e => addFinding(tid, typeof e === 'object' ? (e.type||'finding') : 'finding', typeof e === 'object' ? (e.text||e.path||e.description||JSON.stringify(e)) : String(e)));
                    } else {
                        addFinding(tid, 'finding', entry.description || entry.name || 'Observed in investigation');
                    }
                }
            });
        }
    }

    // Strategy 2: Walk all findings for technique_id / mitre_technique_id references
    function walkFindings(obj, path) {
        if (!obj || typeof obj !== 'object') return;
        if (Array.isArray(obj)) {
            obj.forEach((item, i) => walkFindings(item, path + '[' + i + ']'));
            return;
        }
        // Check if this object has a technique ID
        const tid = obj.technique_id || obj.techniqueId || obj.mitre_technique_id || obj.mitre_technique_id;
        if (tid) {
            // Try to find associated evidence
            const evidence = obj.evidence || obj.evidence_path || obj.file_path || obj.artifact_path || [];
            const desc = obj.description || obj.finding || obj.name || obj.detail || '';
            const ioc = obj.ioc || obj.indicator || obj.observable || '';
            const filePath = obj.file || obj.file_path || obj.path || obj.artifact || obj.source || '';

            if (Array.isArray(evidence) && evidence.length > 0) {
                evidence.forEach(e => {
                    if (typeof e === 'string') {
                        addFinding(tid, 'finding', e);
                    } else {
                        const eType = e.type || (e.path ? 'file' : e.ioc ? 'ioc' : 'finding');
                        const eText = e.text || e.path || e.description || e.ioc || e.value || JSON.stringify(e);
                        addFinding(tid, eType, eText);
                    }
                });
            }
            if (filePath) addFinding(tid, 'file', filePath);
            if (ioc) addFinding(tid, 'ioc', typeof ioc === 'string' ? ioc : JSON.stringify(ioc));
            if (desc && !filePath && !ioc && !(Array.isArray(evidence) && evidence.length > 0)) {
                addFinding(tid, 'finding', desc);
            }
            // If no evidence at all, still mark as detected
            if (!findings[tid] || findings[tid].length === 0) {
                addFinding(tid, 'finding', desc || 'Referenced in case findings');
            }
        }

        // Also check for tags or labels
        if (obj.tags && Array.isArray(obj.tags)) {
            obj.tags.forEach(tag => {
                const match = String(tag).match(/^(T\d{4}(\.\d{3})?)$/i);
                if (match) {
                    addFinding(match[1].toUpperCase(), 'finding', obj.description || obj.name || obj.text || `Tagged: ${match[1]}`);
                }
            });
        }

        // Recurse
        for (const key of Object.keys(obj)) {
            if (key === 'parent' || key === 'prev' || key === 'next') continue;
            walkFindings(obj[key], path + '.' + key);
        }
    }
    walkFindings(data, '');

    // Strategy 3: Look for investigation_chains or chains
    if (data.investigation_chains || data.chains) {
        const chains = data.investigation_chains || data.chains;
        if (Array.isArray(chains)) {
            chains.forEach(chain => {
                const steps = chain.steps || chain.findings || chain.events || [];
                if (Array.isArray(steps)) {
                    steps.forEach(step => walkFindings(step, 'chain'));
                }
            });
        }
    }

    // Strategy 4: Check mitre_attack or attack_matrix fields
    if (data.mitre_attack || data.attack_matrix) {
        const matrix = data.mitre_attack || data.attack_matrix;
        if (Array.isArray(matrix)) {
            matrix.forEach(entry => {
                if (entry.technique_id || entry.id) {
                    const tid = entry.technique_id || entry.id;
                    const evs = entry.evidence || entry.findings || entry.linked_findings || [];
                    if (Array.isArray(evs) && evs.length > 0) {
                        evs.forEach(e => addFinding(tid, typeof e === 'object' ? (e.type||'finding') : 'finding', typeof e === 'object' ? (e.text||e.path||e.description||JSON.stringify(e)) : String(e)));
                    } else {
                        addFinding(tid, 'finding', entry.description || entry.name || 'Mapped in ATT&CK matrix');
                    }
                }
            });
        }
    }

    // Strategy 5: Check attack_chain (actual Geoff case report structure)
    if (data.attack_chain) {
        const ac = data.attack_chain;
        // Direct mitre_techniques_observed array
        if (ac.mitre_techniques_observed && Array.isArray(ac.mitre_techniques_observed)) {
            ac.mitre_techniques_observed.forEach(tid => {
                addFinding(tid, 'finding', 'Observed in attack chain');
            });
        }
        // Walk findings_detail for evidence to link to techniques
        if (data.findings_detail && Array.isArray(data.findings_detail)) {
            data.findings_detail.forEach(finding => {
                walkFindings(finding, 'findings_detail');
            });
        }
        // Also walk the attack_chain object itself
        walkFindings(ac, 'attack_chain');
    }

    // If we have mitre_techniques_observed at root or nested, ensure detection
    if (data.mitre_techniques_observed && Array.isArray(data.mitre_techniques_observed)) {
        data.mitre_techniques_observed.forEach(tid => {
            addFinding(tid, 'finding', 'Observed in case');
        });
    }

    return findings;
}

// ============================================
// ============================================
// Render the matrix
// ============================================
function renderMatrix(filter) {
    const container = document.getElementById('matrixContainer');
    container.innerHTML = '';

    const tacticNames = Object.keys(MITRE_DATA);
    const maxRows = Math.max(...tacticNames.map(t => MITRE_DATA[t].techniques.length));

    // Build grid template: first column for tactic headers, rest for technique columns
    const colTemplate = tacticNames.map(() => '1fr').join(' ');
    const grid = document.createElement('div');
    grid.className = 'matrix-table';
    grid.style.gridTemplateColumns = colTemplate;

    // Row 0: Tactic headers (with empty first cell)


    tacticNames.forEach(tacticName => {
        const data = MITRE_DATA[tacticName];
        const detectedCount = data.techniques.filter(t => detectedTechniques[t.id]).length;
        const header = document.createElement('div');
        header.className = 'tactic-header';
        header.innerHTML = `
            <div class="tactic-name">${tacticName.toUpperCase()}</div>
            <div class="tactic-count"><span class="det-count">${detectedCount}</span> / ${data.techniques.length}</div>
        `;
        grid.appendChild(header);
    });

    // Rows: one per technique index
    for (let row = 0; row < maxRows; row++) {
        // Row label

        tacticNames.forEach(tacticName => {
            const data = MITRE_DATA[tacticName];
            const tech = data.techniques[row];
            const cell = document.createElement('div');

            if (!tech) {
                // Empty cell to fill the grid
                cell.className = 'tech-cell not-detected';
                cell.style.background = 'transparent';
                cell.style.border = '1px solid transparent';
                cell.style.cursor = 'default';
                grid.appendChild(cell);
                return;
            }

            const isDetected = !!detectedTechniques[tech.id];
            const shouldShow = filter === 'all' ||
                (filter === 'detected' && isDetected) ||
                (filter === 'undetected' && !isDetected);

            cell.className = `tech-cell ${isDetected ? 'detected' : 'not-detected'}`;
            cell.dataset.techId = tech.id;
            cell.dataset.tactic = tacticName;
            cell.dataset.name = tech.name;
            cell.dataset.detected = isDetected ? '1' : '0';

            if (!shouldShow && filter !== 'all') {
                cell.style.opacity = '0.15';
                cell.style.pointerEvents = 'none';
            }

            const evidenceCount = isDetected ? detectedTechniques[tech.id].length : 0;
            cell.innerHTML = `
                <div class="tech-id">${tech.id}</div>
                <div class="tech-name">${tech.name}</div>
                ${isDetected ? `<div class="tech-evidence-count">${evidenceCount} item${evidenceCount>1?'s':''}</div>` : ''}
            `;

            // Hover events
            cell.addEventListener('mouseenter', onCellHover);
            cell.addEventListener('mousemove', onCellMove);
            cell.addEventListener('mouseleave', onCellLeave);
            cell.addEventListener('click', onCellClick);

            grid.appendChild(cell);
        });
    }

    container.appendChild(grid);
}

// Tooltip handling
// ============================================
const tooltip = document.getElementById('hoverTooltip');
let tooltipActive = false;

function onCellHover(e) {
    const cell = e.currentTarget;
    const techId = cell.dataset.techId;
    const name = cell.dataset.name;
    const isDetected = cell.dataset.detected === '1';

    document.getElementById('ttId').textContent = techId;
    document.getElementById('ttName').textContent = name;

    const findingsDiv = document.getElementById('ttFindings');

    if (isDetected && detectedTechniques[techId]) {
        document.getElementById('ttHint').textContent = 'Click for full evidence';
        findingsDiv.style.display = 'block';
        findingsDiv.innerHTML = '<div style="font-size:10px;color:var(--accent-red);font-weight:600;margin-bottom:6px;">LINKED FINDINGS:</div>';
        const items = detectedTechniques[techId].slice(0, 4);
        items.forEach(f => {
            const div = document.createElement('div');
            div.className = 'tt-finding-item';
            const icon = f.type === 'file' ? '📄' : f.type === 'ioc' ? '🎯' : f.type === 'network' ? '🌐' : '📋';
            div.textContent = icon + ' ' + f.text;
            findingsDiv.appendChild(div);
        });
        if (detectedTechniques[techId].length > 4) {
            const more = document.createElement('div');
            more.className = 'tt-finding-item';
            more.style.color = 'var(--text-muted)';
            more.textContent = `+ ${detectedTechniques[techId].length - 4} more...`;
            findingsDiv.appendChild(more);
        }
    } else {
        document.getElementById('ttHint').textContent = 'No evidence linked';
        findingsDiv.style.display = 'none';
    }

    tooltip.classList.add('visible');
    tooltipActive = true;
}

function onCellMove(e) {
    if (!tooltipActive) return;
    const x = e.clientX + 16;
    const y = e.clientY + 16;
    const maxX = window.innerWidth - 360;
    const maxY = window.innerHeight - 200;
    tooltip.style.left = Math.min(x, maxX) + 'px';
    tooltip.style.top = Math.min(y, maxY) + 'px';
}

function onCellLeave() {
    tooltip.classList.remove('visible');
    tooltipActive = false;
}

// ============================================
// Update stats
// ============================================
function updateStats() {
    let totalTechs = 0;
    let detectedTechs = 0;
    let totalEvidence = 0;

    Object.values(MITRE_DATA).forEach(tactic => {
        tactic.techniques.forEach(t => {
            totalTechs++;
            if (detectedTechniques[t.id]) {
                detectedTechs++;
                totalEvidence += detectedTechniques[t.id].length;
            }
        });
    });

    document.getElementById('statDetected').textContent = detectedTechs;
    document.getElementById('statTotal').textContent = totalTechs;
    document.getElementById('statEvidence').textContent = totalEvidence;
    document.getElementById('statCoverage').textContent = totalTechs > 0
        ? Math.round((detectedTechs / totalTechs) * 100) + '%'
        : '0%';
}

    dot.className = 'status-dot ' + type;
    txt.textContent = text;
}

// ============================================
// Main initialization
// ============================================
async function init() {
    const caseId = getCaseId();
    document.getElementById('caseBadge').textContent = `CASE: ${caseId}`;

    setStatus('loading', 'Fetching case data...');

    try {
        const data = await fetchCaseData(caseId);

        if (data) {
            setStatus('loading', 'Mapping MITRE techniques...');
            detectedTechniques = extractTechniquesFromReport(data);
            const techCount = Object.keys(detectedTechniques).length;

            if (techCount > 0) {
                setStatus('', `Loaded: ${techCount} techniques from case report`);
                document.getElementById('caseBadge').textContent = `CASE: ${caseId} (API)`;
            } else {
                // No MITRE techniques in report
                setStatus('empty', 'No MITRE techniques found in this case');
            }
        } else {
            // API unavailable
            setStatus('error', 'Case report API unavailable');
        }
    } catch(err) {
        console.error('Error loading case data:', err);
        setStatus('error', 'Error loading case data');
    }

    // Render
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('matrixContainer').style.display = 'block';
    updateStats();
    renderMatrix(currentFilter);
}

init();
</script>
</body>
</html>
