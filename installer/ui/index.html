<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoff AI Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Geoff</h1>
            <p>AI Assistant</p>
            <div class="status" id="status">Connecting...</div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="chat">Chat</button>
            <button class="tab-btn" data-tab="evidence">Evidence</button>
            <button class="tab-btn" data-tab="config">Config</button>
        </nav>

        <main>
            <!-- Chat Tab -->
            <div class="tab-content active" id="chat-tab">
                <div class="chat-container">
                    <div class="messages" id="messages">
                        <div class="message system">
                            <div class="content">Hello! I'm Geoff. How can I help you today?</div>
                            <div class="time">Now</div>
                        </div>
                    </div>
                    <div class="input-area">
                        <textarea id="chat-input" placeholder="Type your message..." rows="3"></textarea>
                        <button id="send-btn" class="btn-primary">Send</button>
                    </div>
                </div>
            </div>

            <!-- Evidence Tab -->
            <div class="tab-content" id="evidence-tab">
                <div class="evidence-container">
                    <h2>Evidence Upload</h2>
                    <div class="upload-zone" id="upload-zone">
                        <div class="upload-icon">📁</div>
                        <p>Drag & drop files here or click to browse</p>
                        <input type="file" id="file-input" multiple hidden>
                        <button class="btn-secondary" onclick="document.getElementById('file-input').click()">Select Files</button>
                    </div>
                    <div class="evidence-location">
                        <h3>Evidence Storage Location</h3>
                        <div class="input-group">
                            <input type="text" id="evidence-path" value="~/.geoff/evidence" readonly>
                            <button class="btn-secondary" id="change-evidence-path">Change</button>
                        </div>
                    </div>
                    <div class="file-list" id="file-list">
                        <h3>Uploaded Files</h3>
                        <div class="files" id="files-container">
                            <p class="empty">No files uploaded yet</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Config Tab -->
            <div class="tab-content" id="config-tab">
                <div class="config-container">
                    <h2>Configuration</h2>
                    
                    <div class="config-section">
                        <h3>Model Settings</h3>
                        <div class="form-group">
                            <label for="model-mode">Model Mode:</label>
                            <select id="model-mode">
                                <option value="local">Local (Ollama)</option>
                                <option value="cloud">Cloud (Ollama Cloud)</option>
                            </select>
                        </div>
                        
                        <div class="form-group" id="local-model-group">
                            <label for="local-model">Local Model:</label>
                            <select id="local-model">
                                <option value="gemma3:4b">Gemma4 (gemma3:4b) - Default</option>
                                <option value="llama3.1:8b">Llama 3.1 (8B)</option>
                                <option value="gemma3:12b">Gemma (12B)</option>
                            </select>
                        </div>

                        <div class="form-group hidden" id="cloud-model-group">
                            <label for="cloud-model">Cloud Model:</label>
                            <select id="cloud-model">
                                <option value="ollama/deepseek-v3.2:cloud">DeepSeek V3.2</option>
                                <option value="ollama/gemma3.4:cloud">Gemma4 Cloud</option>
                                <option value="ollama/qwen2.5:32b:cloud">Qwen 2.5 (32B)</option>
                            </select>
                        </div>
                    </div>

                    <div class="config-section">
                        <h3>Evidence Settings</h3>
                        <div class="form-group">
                            <label for="evidence-dir">Evidence Directory:</label>
                            <input type="text" id="evidence-dir" value="~/.geoff/evidence">
                            <button class="btn-secondary" id="browse-evidence">Browse</button>
                        </div>
                        <div class="form-group">
                            <label for="auto-process">Auto-process uploads:</label>
                            <input type="checkbox" id="auto-process" checked>
                        </div>
                    </div>

                    <div class="config-section">
                        <h3>Gateway Settings</h3>
                        <div class="form-group">
                            <label for="gateway-port">Port:</label>
                            <input type="number" id="gateway-port" value="18789">
                        </div>
                        <div class="form-group">
                            <label for="auth-token">Auth Token:</label>
                            <input type="password" id="auth-token" value="geoff-default">
                            <button class="btn-secondary" id="show-token">Show</button>
                        </div>
                    </div>

                    <div class="config-actions">
                        <button class="btn-primary" id="save-config">Save Configuration</button>
                        <button class="btn-secondary" id="restart-geoff">Restart Geoff</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
