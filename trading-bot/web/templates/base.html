<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Oil Trading Bot{% endblock %}</title>
    <style>
        :root {
            --bg-primary: #0a192f;
            --bg-secondary: #16213e;
            --bg-card: #0f2847;
            --accent: #00d4aa;
            --accent-red: #e74c3c;
            --accent-orange: #f39c12;
            --text-primary: #e6f1ff;
            --text-secondary: #8892b0;
            --border: #1d3a5c;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--accent);
            padding: 20px 0;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 212, 170, 0.1);
        }
        
        header h1 {
            text-align: center;
            color: var(--accent);
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        header p {
            text-align: center;
            color: var(--text-secondary);
        }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }
        
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .nav a:hover, .nav a.active {
            background: var(--accent);
            color: var(--bg-primary);
        }
        
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-online { background: var(--accent); }
        .status-offline { background: var(--accent-red); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        
        .card h2 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: var(--accent);
        }
        
        .stat-label {
            color: var(--text-secondary);
            margin-top: 5px;
            font-size: 0.9em;
        }
        
        .log-container {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid var(--border);
        }
        
        .log-line { margin: 2px 0; }
        .log-info { color: var(--accent); }
        .log-error { color: var(--accent-red); }
        .log-warning { color: var(--accent-orange); }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        th {
            background: var(--bg-secondary);
            color: var(--accent);
            font-weight: 600;
        }
        
        tr:hover {
            background: rgba(0, 212, 170, 0.05);
        }
        
        .positive { color: var(--accent); }
        .negative { color: var(--accent-red); }
        
        .btn {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #00b894;
            transform: translateY(-2px);
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            header h1 { font-size: 1.5em; }
            .stats-grid { grid-template-columns: 1fr; }
            .nav { flex-direction: column; align-items: center; }
            table { font-size: 0.85em; }
            th, td { padding: 8px; }
        }
        
        /* Chart containers */
        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1>🛢️ Oil Trading Bot</h1>
            <p>AI-Powered WTI/Brent CFD Trading System</p>
            
            <nav class="nav">
                <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
                <a href="/oil-research" {% if request.path == '/oil-research' %}class="active"{% endif %}>Research</a>
                <a href="/tracker" {% if request.path == '/tracker' %}class="active"{% endif %}>Tracker</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <p>Oil Trading Bot v2.0 | Paper Trading Mode | Last updated: {{ now }}</p>
    </footer>
    
    {% block scripts %}{% endblock %}
</body>
</html>
